{{/*
========================================================================
ExternalSecrets — Service Accounts GCP
========================================================================
Rendu quand render.only ∈ {externalsecrets, all}.
Skip complètement pour les tenants `type: infra` (ils n'ont pas d'env Apigee).

Pour chaque SA GCP listé dans externalSecrets.gcpServiceAccountNames,
on crée un ExternalSecret qui lit le JSON du SA depuis Vault et crée
un Secret K8s au format attendu par Apigee.

Convention de nommage : apigee-<saType>-<tenant-safe-name>
  ex. apigee-synchronizer-prod-finance
*/}}
{{- if eq (include "apigee-tenant.render" (dict "want" "externalsecrets" "root" .)) "true" }}
{{- if ne (include "apigee-tenant.isInfra" .) "true" }}
{{- $root := . }}
{{- $safe := include "apigee-tenant.safeName" . }}

{{- range $root.Values.externalSecrets.gcpServiceAccountNames }}
{{- $saName := . }}
{{- $saFile := index $root.Values.vault.gcpServiceAccounts $saName }}
{{- if $saFile }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apigee-{{ $saName }}-{{ $safe }}
  namespace: {{ $root.Release.Namespace }}
  labels:
    {{- include "apigee-tenant.labels" $root | nindent 4 }}
    apigee.cloud.google.com/sa-type: {{ $saName | quote }}
spec:
  refreshInterval: {{ $root.Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ $root.Values.platform.vaultSecretStore.kind }}
    name: {{ $root.Values.platform.vaultSecretStore.name }}
  target:
    # Nom attendu par le controller Apigee quand on configure
    # ApigeeEnvironment.components.{synchronizer,udca,mart}.appServiceAccountSecretName
    name: apigee-{{ $saName }}-svc-account-{{ $safe }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Apigee attend la clé "client_secret.json" contenant le JSON du SA
        client_secret.json: "{{ `{{ .sa | toString }}` }}"
  data:
    - secretKey: sa
      remoteRef:
        key: {{ $root.Values.vault.mountPath }}
        property: {{ $saFile | quote }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
