{{/*
Namespace Apigee — rendu uniquement quand render.only ∈ {namespace, all}.

Ce namespace est posé par l'AppSet 01 en sync-wave 0, avec `prune: false`
pour éviter toute suppression accidentelle.

Le label `appUID` est OBLIGATOIRE pour que la Kyverno policy plateforme
crée le RoleBinding qui donne à ArgoCD les droits de créer les autres
ressources dans ce namespace.
*/}}
{{- if eq (include "apigee-platform.render" (dict "want" "namespace" "only" .Values.render.only)) "true" }}
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.namespace.name }}
  labels:
    {{- include "apigee-platform.labels" . | nindent 4 }}
    {{- with .Values.namespace.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.namespace.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
