{{/*
ApigeeOrganization — le CR racine qui définit l'organisation Apigee
sur ce cluster. Rendu uniquement avec render.only ∈ {controller, all}.

Il y a UNE SEULE ApigeeOrganization par cluster. Elle référence le
projet GCP et déclenche l'instanciation du controller et de la stack
runtime partagée.
*/}}
{{- if eq (include "apigee-platform.render" (dict "want" "controller" "only" .Values.render.only)) "true" }}
apiVersion: apigee.cloud.google.com/v1alpha1
kind: ApigeeOrganization
metadata:
  name: {{ .Values.apigee.organization.name }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "apigee-platform.labels" . | nindent 4 }}
spec:
  name: {{ .Values.apigee.organization.name | quote }}
  gcpProjectID: {{ .Values.apigee.gcp.projectID | quote }}
  # Cluster identifier — doit être unique PAR CLUSTER qui héberge cet org
  clusterName: {{ .Values.cluster.name | quote }}
  clusterRegion: {{ .Values.cluster.region | quote }}

  # Le controller Apigee consomme le SA GCP depuis un Secret K8s dédié
  # à l'organisation (matérialisé par ExternalSecret, voir chart apigee-tenant
  # ou un chart apigee-org-secrets séparé à terme).
  controlPlaneAuthentication:
    secretRef: apigee-control-plane-sa

  instanceID: {{ .Values.cluster.name | quote }}
{{- end }}
