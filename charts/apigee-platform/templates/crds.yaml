{{/*
CRDs Apigee Hybrid — rendues uniquement quand render.only ∈ {crds, all}.

⚠️  Pour une vraie installation, les CRDs officielles Apigee sont copiées
dans le dossier `charts/apigee-platform/crds/` depuis le tarball officiel
`apigee-hybrid-setup-1.14.0.tar.gz` (chemin : `charts/apigee-operator/crds/`).

Helm applique automatiquement tout fichier du dossier `crds/` avec le
même comportement que `helm install --replace`. Mais ArgoCD ignore ce
dossier spécial par défaut (il ne lit que `templates/`).

⇒ Solution retenue : soit on inclut les CRDs via le bloc ci-dessous
(render explicite en templates/), soit on utilise un AppSet avec
`directory.include: "crds/*.yaml"`.

Ici on garde le placeholder et on pose les CRDs via `include` sur des
fichiers externes en `templates/crds/*.yaml` pour simplicité.

PROCÉDURE D'UPGRADE (quand Apigee sort une nouvelle version) :
1. Télécharger le tarball officiel
2. Copier les CRDs de `charts/apigee-operator/crds/` vers
   `charts/apigee-platform/templates/crds/`
3. Bumper `apigee.hybridVersion` dans values-common.yaml
4. Vérifier avec `helm template` que le rendu est propre
5. MR + merge → ArgoCD applique via ServerSideApply + Replace
*/}}
{{- if eq (include "apigee-platform.render" (dict "want" "crds" "only" .Values.render.only)) "true" }}
{{- /*
En pratique, les CRDs sont dans templates/crds/*.yaml et sont rendues
automatiquement par Helm. On met ici un ConfigMap informatif qui porte
la version Apigee déployée pour traçabilité.
*/ -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: apigee-crds-version
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "apigee-platform.labels" . | nindent 4 }}
data:
  hybridVersion: {{ .Values.apigee.hybridVersion | quote }}
  enabledCRDs: |
    {{- range .Values.crds.enabled }}
    - {{ . }}
    {{- end }}
  # Source du chart CRDs officiel pour traçabilité
  source: "apigee-hybrid-setup-{{ .Values.apigee.hybridVersion }}/charts/apigee-operator/crds/"
{{- end }}
