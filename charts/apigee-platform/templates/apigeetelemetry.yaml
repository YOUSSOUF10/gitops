{{/*
ApigeeTelemetry — CR qui pilote logs, metrics et traces vers GCP.
Rendu avec render.only ∈ {controller, all}.
*/}}
{{- if eq (include "apigee-platform.render" (dict "want" "controller" "only" .Values.render.only)) "true" }}
apiVersion: apigee.cloud.google.com/v1alpha1
kind: ApigeeTelemetry
metadata:
  name: apigee-telemetry
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "apigee-platform.labels" . | nindent 4 }}
spec:
  metrics:
    enabled: {{ .Values.telemetry.metrics.enabled }}
    # Secret contenant le SA GCP metrics, matérialisé par ExternalSecret
    appSecretRef: apigee-metrics-apigee
  logger:
    enabled: {{ .Values.telemetry.logger.enabled }}
  # Config export custom (Prometheus local, etc.) si activé
  {{- if .Values.prometheus.enabled }}
  additionalMetrics:
    enabled: true
  {{- end }}
{{- end }}
