# charts/apigee-tenant/values.yaml

# ----------------------------------------------------------------------------
# Sélecteur de rendu — positionné par chaque AppSet tenant via --set
# ----------------------------------------------------------------------------
render:
  only: all  # externalsecrets | ingressgateway | apigee-env | exposure | all

# ----------------------------------------------------------------------------
# Contexte tenant — injecté via parameters depuis l'AppSet
# ----------------------------------------------------------------------------
tenant:
  name: ""        # ex. "prod-finance"
  cluster: ""     # ex. "cluster-A"
  appUID: ""      # ex. "ap43591"
  # Type du tenant : "standard" (défaut) ou "infra" (tenant technique
  # qui ne pose qu'une IngressGateway mutualisée, pas d'ApigeeEnvironment)
  type: standard

# ----------------------------------------------------------------------------
# Attributs tenant — viennent du generator ET des values par tenant
# ----------------------------------------------------------------------------
apigeeEnv: ""
apigeeEnvGroup: ""
platformEnv: ""

# ----------------------------------------------------------------------------
# Plateforme (renseigné par values-common.yaml racine)
# ----------------------------------------------------------------------------
platform:
  vaultSecretStore:
    kind: ClusterSecretStore
    name: ""
  ingressClass: traefik
  traefikNamespace: traefik
  externalTLSSecret: ingress-tls

# ----------------------------------------------------------------------------
# ExternalSecrets
# ----------------------------------------------------------------------------
externalSecrets:
  refreshInterval: "1h"
  gcpServiceAccountNames:
    - synchronizer
    - udca
    - mart
    - metrics

# ----------------------------------------------------------------------------
# Vault
# ----------------------------------------------------------------------------
vault:
  mountPath: ""
  gcpServiceAccounts: {}
  tls:
    internalCert: ""
    caBundle: ""

# ----------------------------------------------------------------------------
# Ingress Gateway
# ----------------------------------------------------------------------------
ingressGateway:
  mode: shared             # dedicated | shared
  name: ""
  sharedGatewayName: ""
  replicas: 2
  svcType: ClusterIP
  tlsSecretName: ""
  resources:
    requests:
      cpu: 300m
      memory: 512Mi
    limits:
      memory: 1Gi

# ----------------------------------------------------------------------------
# Exposition Traefik
# ----------------------------------------------------------------------------
exposition:
  ingressClass: traefik
  hosts: []
  targetServiceName: ""
  serversTransport:
    name: ""
    serverName: ""
    insecureSkipVerify: false
    rootCAsSecret: ""

# ----------------------------------------------------------------------------
# Dimensionnement Apigee
# ----------------------------------------------------------------------------
apigee:
  organization: ""
  runtime:
    replicas: 1
    image:
      repository: ""
    resources: {}
    nodeSelector: {}
    tolerations: []
  synchronizer:
    replicas: 1
    resources: {}

runtime:
  replicas: 1

synchronizer:
  replicas: 1

cassandraReplication: {}

# ----------------------------------------------------------------------------
# NetworkPolicies
# ----------------------------------------------------------------------------
networkPolicies:
  enabled: false
  allowNamespaces: []

# ----------------------------------------------------------------------------
# ResourceQuota
# ----------------------------------------------------------------------------
resourceQuota:
  enabled: false
  hard: {}

# ----------------------------------------------------------------------------
# PDB
# ----------------------------------------------------------------------------
pdb:
  enabled: false
  minAvailable: 1

# ----------------------------------------------------------------------------
# Labels
# ----------------------------------------------------------------------------
commonLabels: {}
