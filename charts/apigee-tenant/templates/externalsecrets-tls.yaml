{{/*
========================================================================
ExternalSecrets — TLS interne (cert Apigee) + CA bundle
========================================================================
Rendu avec render.only ∈ {externalsecrets, all}.

DEUX secrets matérialisés :

1. Cert TLS de l'IngressGateway Apigee (Secret kubernetes.io/tls)
   → Consommé par l'ApigeeIngressGateway du tenant pour terminer le HTTPS
     entrant depuis Traefik.

2. CA bundle (Secret Opaque avec une clé "ca.crt")
   → Consommé par le ServersTransport Traefik pour vérifier le cert du
     pod Apigee lors du forward HTTPS.
     Partagé entre tous les tenants (même CA interne d'entreprise), donc
     on le génère quand même par tenant pour garantir sa présence — les
     ExternalSecret sont idempotents sur le même Secret cible.

Inclut les tenants INFRA (ils ont aussi besoin du cert pour leur gateway
mutualisée).
*/}}
{{- if eq (include "apigee-tenant.render" (dict "want" "externalsecrets" "root" .)) "true" }}
{{- $safe := include "apigee-tenant.safeName" . }}

{{- /* ---- 1. Cert TLS interne (type: kubernetes.io/tls) ---- */ -}}
{{- if .Values.vault.tls.internalCert }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apigee-tls-{{ $safe }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apigee-tenant.labels" . | nindent 4 }}
    apigee.cloud.google.com/secret-type: internal-tls
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.platform.vaultSecretStore.kind }}
    name: {{ .Values.platform.vaultSecretStore.name }}
  target:
    name: {{ .Values.ingressGateway.tlsSecretName | default (printf "apigee-tls-%s" $safe) }}
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
      data:
        tls.crt: "{{ `{{ .cert | toString }}` }}"
        tls.key: "{{ `{{ .key | toString }}` }}"
  data:
    - secretKey: cert
      remoteRef:
        key: {{ .Values.vault.mountPath }}/{{ .Values.vault.tls.internalCert }}
        property: certificate
    - secretKey: key
      remoteRef:
        key: {{ .Values.vault.mountPath }}/{{ .Values.vault.tls.internalCert }}
        property: private_key
{{- end }}

{{- /* ---- 2. CA bundle (pour ServersTransport Traefik) ---- */ -}}
{{- if and .Values.vault.tls.caBundle .Values.exposition.serversTransport.rootCAsSecret }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: apigee-ca-trust-{{ $safe }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apigee-tenant.labels" . | nindent 4 }}
    apigee.cloud.google.com/secret-type: ca-bundle
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.platform.vaultSecretStore.kind }}
    name: {{ .Values.platform.vaultSecretStore.name }}
  target:
    name: {{ .Values.exposition.serversTransport.rootCAsSecret }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        # Traefik ServersTransport attend la clé "tls.ca" dans rootCAsSecrets
        tls.ca: "{{ `{{ .ca | toString }}` }}"
  data:
    - secretKey: ca
      remoteRef:
        # Le path est relatif au mount tenant : on résout vault.tls.caBundle
        # qui peut être une ref relative (ex. "../ca/internal-ca")
        key: {{ .Values.vault.mountPath }}/{{ .Values.vault.tls.caBundle }}
        property: ca_certificate
{{- end }}
{{- end }}
