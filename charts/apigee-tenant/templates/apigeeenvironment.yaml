{{/*
========================================================================
ApigeeEnvironment
========================================================================
Rendu avec render.only ∈ {apigee-env, all}.
Skip pour les tenants type: infra (ils n'ont pas d'env Apigee).

C'est CE CR qui déclenche la création des pods apigee-runtime,
apigee-synchronizer, apigee-udca dans le namespace apigee.

Dépend de :
  - Cassandra UP (wave 15)
  - ExternalSecrets SA GCP matérialisés (wave 25)
  - ApigeeIngressGateway disponible si mode dedicated (wave 28) — mais
    en fait l'ApigeeEnvironment peut se créer sans la gateway (le routing
    se fait via l'EnvGroup qui la référence).
*/}}
{{- if eq (include "apigee-tenant.render" (dict "want" "apigee-env" "root" .)) "true" }}
{{- if ne (include "apigee-tenant.isInfra" .) "true" }}
{{- $safe := include "apigee-tenant.safeName" . }}
apiVersion: apigee.cloud.google.com/v1alpha1
kind: ApigeeEnvironment
metadata:
  name: {{ .Values.apigeeEnv }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apigee-tenant.labels" . | nindent 4 }}
spec:
  name: {{ .Values.apigeeEnv | quote }}
  organizationRef: {{ .Values.apigee.organization | quote }}

  # Composants runtime Apigee — chacun consomme un SA GCP matérialisé
  # par ExternalSecret depuis Vault.
  components:
    runtime:
      replicaCountMin: {{ .Values.runtime.replicas | default 1 }}
      replicaCountMax: {{ mul (.Values.runtime.replicas | default 1) 2 }}
      {{- with .Values.apigee.runtime.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apigee.runtime.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.apigee.runtime.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

    synchronizer:
      replicaCountMin: {{ .Values.synchronizer.replicas | default 1 }}
      replicaCountMax: {{ mul (.Values.synchronizer.replicas | default 1) 2 }}
      appServiceAccountSecretName: apigee-synchronizer-svc-account-{{ $safe }}
      {{- with .Values.apigee.synchronizer.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}

    udca:
      replicaCountMin: 1
      replicaCountMax: 2
      appServiceAccountSecretName: apigee-udca-svc-account-{{ $safe }}

  # Cassandra replication factor par DC — doit correspondre à ce qui est
  # réellement configuré côté ApigeeDatastore (values-topology.yaml).
  {{- if .Values.cassandraReplication }}
  hostAlias: {{ .Values.apigeeEnv | quote }}
  {{- end }}
---
{{/*
========================================================================
ApigeeEnvGroup
========================================================================
Groupe qui porte les virtualhosts (hostnames exposés) et référence
l'IngressGateway (shared ou dedicated).
*/}}
apiVersion: apigee.cloud.google.com/v1alpha1
kind: ApigeeEnvGroup
metadata:
  name: {{ .Values.apigeeEnvGroup }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apigee-tenant.labels" . | nindent 4 }}
spec:
  name: {{ .Values.apigeeEnvGroup | quote }}
  organizationRef: {{ .Values.apigee.organization | quote }}

  # Rattachement des env → envgroup
  routingRules:
    - envs:
        - {{ .Values.apigeeEnv }}
      hosts:
        {{- range .Values.exposition.hosts }}
        - {{ .host | quote }}
        {{- end }}

  # Référence à la gateway (shared ou dedicated) — via le helper
  ingressGateways:
    - name: {{ include "apigee-tenant.gatewayName" . | quote }}
{{- end }}
{{- end }}
