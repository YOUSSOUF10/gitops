{{/*
CassandraDataReplication — CR utilisée UNIQUEMENT en phase 2.

Ce CR permet au controller Apigee de piloter la réplication des données
vers le nouveau DC2 lors de l'extension multi-DC.

Elle n'est générée que si :
  - multiRegion.enabled: true
  - Et qu'il y a plus d'1 datacenter configuré

Même avec ce CR, l'ÉTAPE MANUELLE `nodetool rebuild -- dc-1` depuis le
DC2 reste obligatoire pour répliquer les données existantes.
Voir docs/cassandra-phase2.md
*/}}
{{- if eq (include "apigee-cassandra.isMultiDC" .) "true" }}
apiVersion: apigee.cloud.google.com/v1alpha1
kind: CassandraDataReplication
metadata:
  name: apigee-cassandra-data-replication
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "apigee-cassandra.labels" . | nindent 4 }}
spec:
  # Source : le DC d'origine (dc-1)
  source:
    region: {{ (index .Values.cassandra.datacenters 0).name | quote }}
  # Destination : le nouveau DC (dc-2)
  destinationRegion: {{ (index .Values.cassandra.datacenters 1).name | quote }}
{{- end }}
