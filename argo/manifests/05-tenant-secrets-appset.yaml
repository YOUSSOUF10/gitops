# AppSet 05 — Tenant External Secrets
#
# Rôle : par tenant et par cluster, poser les ExternalSecret qui matérialisent
#        dans le namespace apigee les Secrets K8s nécessaires :
#        - SA GCP (synchronizer, udca, mart, metrics)
#        - Cert TLS interne (type kubernetes.io/tls) pour l'IngressGateway
#        - CA bundle interne (pour ServersTransport Traefik)
#
# Pré-requis :
#   - ClusterSecretStore "vault-<appUID>" fourni par la plateforme
#   - Paths Vault provisionnés par l'équipe sécurité AVANT le merge de la MR tenant
#
# Doit finir AVANT la wave 30 (ApigeeEnvironment), sinon les pods Apigee
# plantent en CrashLoopBackOff car ils ne trouvent pas leurs Secrets.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apigee-tenant-secrets-appset
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
              revision: HEAD
              files:
                - path: argo/generators/tenants/*.yaml
          - list:
              elements:
                - cluster: cluster-A
                # - cluster: cluster-B

        # Selector : un tenant ne déploie que sur les clusters listés dans
        # son propre champ `targetClusters`. Permet un tenant "dev sur A seulement"
        # à côté d'un tenant "prod-finance sur A et B".
        selector:
          matchExpressions:
            - key: cluster
              operator: In
              # Go template : targetClusters est une liste dans chaque fichier tenant
              values: ["{{`{{ .targetClusters | toJson }}`}}"]

  template:
    metadata:
      name: 'apigee-secrets-{{.tenant}}-{{.cluster}}'
      annotations:
        argocd.argoproj.io/sync-wave: "25"
    spec:
      project: default
      destination:
        name: '{{.cluster}}'
        namespace: apigee
      sources:
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          path: charts/apigee-tenant
          helm:
            releaseName: 'secrets-{{.tenant}}'
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/values/tenants/values-common.yaml
              - $values/values/tenants/{{.tenant}}/values-{{.tenant}}.yaml
              - $values/values/tenants/{{.tenant}}/clusters/values-{{.tenant}}-{{.cluster}}.yaml
            parameters:
              - name: render.only
                value: externalsecrets
              - name: tenant.name
                value: '{{.tenant}}'
              - name: tenant.cluster
                value: '{{.cluster}}'
              - name: tenant.appUID
                value: '{{.appUID}}'
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
