# AppSet 05 — Tenant ExternalSecrets (chart LOCAL apigee-extras)
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apigee-tenant-secrets-appset
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - matrix:
        generators:
          - git:
              repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
              revision: HEAD
              files:
                - path: argo/generators/tenants/*.yaml
          - list:
              elements:
                - cluster: cluster-A
                # - cluster: cluster-B
  template:
    metadata:
      name: 'apigee-secrets-{{.tenant}}-{{.cluster}}'
      annotations:
        argocd.argoproj.io/sync-wave: "25"
    spec:
      project: default
      destination:
        name: '{{.cluster}}'
        namespace: apigee
      sources:
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          path: charts/apigee-extras
          helm:
            releaseName: 'secrets-{{.tenant}}'
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/values/tenants/extras-common.yaml
              - $values/values/tenants/{{.tenant}}/values-{{.tenant}}-extras.yaml
            parameters:
              - name: render.only
                value: externalsecrets
              - name: tenant.name
                value: '{{.tenant}}'
              - name: tenant.cluster
                value: '{{.cluster}}'
              - name: tenant.appUID
                value: '{{.appUID}}'
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
