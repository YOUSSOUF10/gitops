# AppSet 03 — Apigee Controller + telemetry
#
# Rôle : poser le controller (apigee-operator) qui réconcilie les CR Apigee,
#        et les composants de télémétrie (logs/metrics/traces vers GCP).
#
# Pré-requis : CRDs en place (wave 5), namespace existant (wave 0).
#
# Notes :
#   - cert-manager est FOURNI par la plateforme, on ne le déploie pas.
#   - External Secrets Operator est FOURNI par la plateforme.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apigee-controller-appset
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - list:
        elements:
          - cluster: cluster-A
          # - cluster: cluster-B

  template:
    metadata:
      name: 'apigee-controller-{{.cluster}}'
      annotations:
        argocd.argoproj.io/sync-wave: "10"
    spec:
      project: default
      destination:
        name: '{{.cluster}}'
        namespace: apigee
      sources:
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          path: charts/apigee-platform
          helm:
            releaseName: apigee-controller
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/values/platform/controller/values-common.yaml
              - $values/values/platform/controller/clusters/values-{{.cluster}}.yaml
              - $values/values/platform/telemetry/values-common.yaml
            parameters:
              - name: render.only
                value: controller
              - name: cluster.name
                value: '{{.cluster}}'
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          ref: values
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
