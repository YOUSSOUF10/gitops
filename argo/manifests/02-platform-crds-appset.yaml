# AppSet 02 — CRDs Apigee Hybrid
#
# Rôle : poser les CRDs Apigee (ApigeeOrganization, ApigeeEnvironment,
#        ApigeeEnvGroup, ApigeeDeployment, ApigeeRoute, etc.).
#
# IMPORTANT :
#   - Les CRDs DOIVENT être posées avant le controller (wave 5 < wave 10).
#   - Elles utilisent ServerSideApply=true + Replace=true pour contourner
#     les hooks Helm "crd-install" (ArgoCD les ignore sinon).
#   - Le chart `apigee-platform` avec `render.only=crds` extrait juste
#     les CRDs du chart officiel Apigee.

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apigee-crds-appset
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]

  generators:
    - list:
        elements:
          - cluster: cluster-A
          # - cluster: cluster-B

  template:
    metadata:
      name: 'apigee-crds-{{.cluster}}'
      annotations:
        argocd.argoproj.io/sync-wave: "5"
    spec:
      project: default
      destination:
        name: '{{.cluster}}'
        namespace: apigee
      sources:
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          path: charts/apigee-platform
          helm:
            releaseName: apigee-crds
            ignoreMissingValueFiles: true
            valueFiles:
              - $values/values/platform/crds/values-common.yaml
            parameters:
              - name: render.only
                value: crds
        - repoURL: https://gitlab.group.echonet/<appUID>/apigee-gitops.git
          targetRevision: HEAD
          ref: values
      syncPolicy:
        automated:
          prune: false       # JAMAIS prune des CRDs — ça supprimerait les CR !
          selfHeal: true
        syncOptions:
          - ServerSideApply=true
          - Replace=true
          - RespectIgnoreDifferences=true
      # Apigee ajoute des conversion webhooks dynamiquement, on ignore.
      ignoreDifferences:
        - group: apiextensions.k8s.io
          kind: CustomResourceDefinition
          jsonPointers:
            - /spec/conversion/webhook/clientConfig/caBundle
