# values/tenants/prod-finance/values-prod-finance.yaml
# ============================================================================
# Surcharges du chart Google "apigee-env" pour le tenant prod-finance
# ============================================================================

namespace: apigee

# Le nom de l'env Apigee (doit correspondre à l'env créé côté control plane)
envName: "prod-finance"
org: "my-apigee-org"

# ---- Runtime ----
runtime:
  replicaCountMin: 3
  replicaCountMax: 6
  resources:
    requests:
      cpu: 1
      memory: 2Gi
    limits:
      memory: 4Gi
  nodeSelector:
    workload: apigee-runtime

# ---- Synchronizer ----
synchronizer:
  replicaCountMin: 2
  replicaCountMax: 4
  # Secret contenant le SA GCP synchronizer (créé par ExternalSecret)
  serviceAccountRef: apigee-synchronizer-svc-account-prod-finance
  resources:
    requests:
      cpu: 200m
      memory: 512Mi

# ---- UDCA ----
udca:
  replicaCountMin: 1
  replicaCountMax: 2
  serviceAccountRef: apigee-udca-svc-account-prod-finance
