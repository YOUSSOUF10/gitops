# values/tenants/prod-finance/values-prod-finance.yaml
# Spécifiques au tenant "prod-finance" (valable pour tous les clusters cibles).
# Les surcharges par cluster vont dans clusters/values-prod-finance-<cluster>.yaml.

apigee:
  runtime:
    # Prod : minimum 3 replicas, PodDisruptionBudget actif
    resources:
      requests:
        cpu: 1
        memory: 2Gi
      limits:
        memory: 4Gi
  synchronizer:
    resources:
      requests:
        cpu: 200m
        memory: 512Mi

# PodDisruptionBudget pour garantir la continuité pendant les upgrades
pdb:
  enabled: true
  minAvailable: 2

# Quotas obligatoires en prod
resourceQuota:
  enabled: true
  hard:
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.memory: 80Gi

# NetworkPolicies strictes en prod
networkPolicies:
  enabled: true
  # Liste explicite des sources autorisées
  allowNamespaces:
    - traefik         # ingress qui route vers nous
  # Egress GCP déjà autorisé par la plateforme via ServiceEntry Istio
