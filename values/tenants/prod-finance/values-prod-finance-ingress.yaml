# values/tenants/prod-finance/values-prod-finance-ingress.yaml
# ============================================================================
# Surcharges du chart Google "apigee-ingress-manager" pour prod-finance.
# Déployé par l'AppSet 06 (wave 28).
# ============================================================================

namespace: apigee

# Nom de la gateway — doit correspondre au `ingressGateways.name` dans virtualhost
ingressGateway:
  name: apigee-ingress-prod-finance

  replicaCountMin: 2
  replicaCountMax: 4

  svcType: ClusterIP

  # Secret TLS (créé par ExternalSecret depuis Vault)
  sslSecret: apigee-tls-prod-finance

  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      memory: 1Gi
