# values/tenants/values-common.yaml
# Partagé par TOUS les tenants (dev, test, prod-*, _infra-*).

# ----------------------------------------------------------------------------
# Plateforme — interfaces fournies par l'équipe plateforme
# ----------------------------------------------------------------------------
platform:
  # ClusterSecretStore fourni par l'équipe plateforme pour accéder à Vault.
  # Nom à CONFIRMER avec eux.
  vaultSecretStore:
    kind: ClusterSecretStore
    name: vault-ap43591
  # IngressClass Traefik
  ingressClass: traefik
  # Namespace Traefik (où vit le secret ingress-tls géré par cert-manager)
  traefikNamespace: traefik
  # Nom du Secret TLS externe (cert public, géré par cert-manager plateforme)
  externalTLSSecret: ingress-tls

# ----------------------------------------------------------------------------
# ExternalSecrets — défaults
# ----------------------------------------------------------------------------
externalSecrets:
  # Fréquence de rafraîchissement depuis Vault
  refreshInterval: "1h"
  # Liste par défaut des SA GCP à matérialiser — peut être surchargée par tenant
  gcpServiceAccountNames:
    - synchronizer
    - udca
    - mart
    - metrics

# ----------------------------------------------------------------------------
# Apigee — défaults applicables à tous les env
# ----------------------------------------------------------------------------
apigee:
  organization: "my-apigee-org"
  # Valeurs par défaut overridables par tenant
  runtime:
    image:
      repository: "gcr.io/apigee-release/hybrid/apigee-runtime"
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        memory: 2Gi
  synchronizer:
    image:
      repository: "gcr.io/apigee-release/hybrid/apigee-synchronizer"
    resources:
      requests:
        cpu: 100m
        memory: 256Mi

# ----------------------------------------------------------------------------
# Labels standards sur tout ce qu'un tenant crée
# ----------------------------------------------------------------------------
commonLabels:
  appUID: ap43591
  app.kubernetes.io/part-of: apigee-hybrid
  app.kubernetes.io/managed-by: argocd
