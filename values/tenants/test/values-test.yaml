# values/tenants/test/values-test.yaml — format chart Google "apigee-env"
namespace: apigee
envName: "test"
org: "my-apigee-org"

runtime:
  replicaCountMin: 2
  replicaCountMax: 3
  resources:
    requests:
      cpu: 300m
      memory: 768Mi
    limits:
      memory: 1536Mi

synchronizer:
  replicaCountMin: 1
  replicaCountMax: 2
  serviceAccountRef: apigee-synchronizer-svc-account-test

udca:
  replicaCountMin: 1
  replicaCountMax: 1
  serviceAccountRef: apigee-udca-svc-account-test
