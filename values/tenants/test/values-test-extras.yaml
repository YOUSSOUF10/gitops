# values/tenants/test/values-test-extras.yaml
tenant:
  type: standard

vault:
  mountPath: secret/ap43591/apigee/test
  gcpServiceAccounts:
    synchronizer: sa-synchronizer.json
    udca: sa-udca.json
    mart: sa-mart.json
    metrics: sa-metrics.json
  tls:
    internalCert: tls/internal
    caBundle: ../ca/internal-ca

ingressGateway:
  mode: shared
  tlsSecretName: apigee-tls-infra-nonprod

exposition:
  ingressClass: traefik
  hosts:
    - host: api-test.mondomaine.com
      tlsSecretRef: ingress-tls
  targetServiceName: apigee-ingress-nonprod
  serversTransport:
    name: ""

networkPolicies:
  enabled: true
  allowNamespaces:
    - traefik
    - devtools
    - qa-tools

pdb:
  enabled: false
