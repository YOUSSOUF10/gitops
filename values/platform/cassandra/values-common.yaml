# values/platform/cassandra/values-common.yaml
# Paramètres Cassandra invariants entre phase 1 et phase 2.

cassandra:
  image:
    # Aligné avec la version Apigee Hybrid.
    repository: "gcr.io/apigee-release/hybrid/apigee-cassandra"
  # Authentication Cassandra (toujours true en prod)
  auth:
    default:
      password: ""            # JAMAIS en clair — vient d'ExternalSecret (voir ci-dessous)
    secretRef: apigee-cassandra-auth   # Secret K8s matérialisé depuis Vault
  # Chiffrement (Transport Layer Security intra-cluster et client)
  tls:
    internodeEncryption: all
    clientEncryption: true
    # Les certs proviennent également de Vault via ExternalSecret
    secretRef: apigee-cassandra-tls
  # JVM
  heapNewSize: 100M
  maxHeapSize: 512M            # à augmenter en prod selon charge observée
  # Resources par pod — dimensionnement minimum Apigee
  resources:
    requests:
      cpu: "2"
      memory: 4Gi
    limits:
      memory: 4Gi

# Storage — les PVCs sont critiques, ne JAMAIS supprimer en prune
storage:
  storageClass: "ibmc-vpc-block-10iops-tier"   # à adapter à ROKS
  size: 500Gi
  # reclaimPolicy: Retain est géré au niveau de la StorageClass, pas ici
